AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Smart Traffic Fog-Cloud Backend

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        SENSOR_TABLE: !Ref SensorTable
        SQS_QUEUE_URL: !Ref SensorQueue

Resources:

  SensorTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SmartTrafficReadings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  SensorQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SmartTrafficQueue
      VisibilityTimeout: 60
      MessageRetentionPeriod: 3600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SmartTrafficDLQ
      MessageRetentionPeriod: 86400

  IngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SmartTrafficIngest
      CodeUri: ../cloud/
      Handler: lambda_function.lambda_handler
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt SensorQueue.QueueName
        - DynamoDBCrudPolicy:
            TableName: !Ref SensorTable
      Events:
        ApiPost:
          Type: Api
          Properties:
            Path: /ingest
            Method: POST
            Auth:
              ApiKeyRequired: true

  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SmartTrafficProcessor
      CodeUri: ../cloud/
      Handler: lambda_function.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SensorTable
        - SQSPollerPolicy: 
            QueueName: !GetAtt SensorQueue.QueueName
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt SensorQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

Outputs:
  ApiEndpoint:
    Description: "Paste this into fog/fog_node.py as CLOUD_ENDPOINT"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/ingest"
  TableName:
    Value: !Ref SensorTable
  QueueUrl:
    Value: !Ref SensorQueue